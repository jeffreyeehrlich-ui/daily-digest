name: Daily Digest

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Restore persisted logs (story_history.json, economist_history.json) ──
      - name: Restore logs cache
        uses: actions/cache@v4
        with:
          path: logs/
          # New key every run so the cache is always updated after each digest.
          # restore-keys finds the most recent prior entry when the exact key misses.
          key: digest-logs-${{ github.run_number }}
          restore-keys: |
            digest-logs-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic feedparser sendgrid python-dotenv pyyaml requests beautifulsoup4 lxml \
            google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      # ── Generate reading list config with GitHub token ────────────────────
      # READING_LIST_TOKEN must be a GitHub Personal Access Token with repo scope.
      # This is separate from any other tokens used in this workflow.
      # To create it: github.com/settings/tokens → Generate new token (classic)
      #   → check 'repo' scope → copy value → add as GitHub secret READING_LIST_TOKEN
      - name: Generate reading list config
        run: |
          echo "const GITHUB_CONFIG = {" > reading-list/config.js
          echo "  token: '${{ secrets.READING_LIST_TOKEN }}'," >> reading-list/config.js
          echo "  username: 'jeffreyeehrlich-ui'," >> reading-list/config.js
          echo "  repo: 'daily-digest'" >> reading-list/config.js
          echo "};" >> reading-list/config.js

      # ── Commit config.js so GitHub Pages serves it with the real token ──────
      # Uses -f to bypass .gitignore (which blocks accidental manual commits).
      # [skip ci] prevents this commit from re-triggering the workflow.
      - name: Deploy reading list config to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reading-list/config.js
          git diff --staged --quiet || git commit -m "Deploy reading list config [skip ci]"
          git push origin master

      - name: Generate and send digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          ECONOMIST_SESSION_COOKIE: ${{ secrets.ECONOMIST_SESSION_COOKIE }}
        run: python digest.py --send

      # ── Persist updated logs back to cache ────────────────────────────────
      # actions/cache saves automatically on post-step if the cache was restored
      # or if the key is new, so no explicit save step is needed.
