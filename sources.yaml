  # ── Research & Market Intelligence ────────────────────────────────────────
  # Scraped sources (type: scrape) pull the public insights/research listing
  # pages directly.  RSS sources aggregate institutional research from wire
  # services.  All scraped sources use a 7-day lookback (168 h).
  research_intel:

    # Investment-bank and asset-manager insights pages (scraped)
    - name: Goldman Sachs Insights
      url: https://www.goldmansachs.com/insights/
      type: scrape
      lookback_hours: 168

    - name: Morgan Stanley Ideas
      url: https://www.morganstanley.com/ideas
      type: scrape
      lookback_hours: 168

    - name: JPMorgan Insights
      url: https://www.jpmorgan.com/insights
      type: scrape
      lookback_hours: 168

    - name: BlackRock Investment Institute
      url: https://www.blackrock.com/us/individual/insights
      type: scrape
      lookback_hours: 168

    # CRE broker research pages (scraped)
